[build]
  publish = "."

[build.environment]
  # SUPABASE_URL and the publishable key are PUBLIC by design — they belong in
  # browser code (portal.js). Exclude only the URL from secret scanning so the
  # scanner still protects real secrets (e.g. SUPABASE_SERVICE_ROLE_KEY).
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_URL,ADMIN_EMAILS"

[functions]
  directory = "netlify/functions"

[[headers]]
  for = "/*.mp4"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.webm"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[redirects]]
  from = "/portal"
  to = "/portal.html"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 404
