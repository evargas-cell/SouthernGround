<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Affiliate Portal — Southern Ground Capital</title>
  <link rel="icon" href="logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --forest:#16261C; --forest-mid:#1E3226; --amber:#9B6820; --amber-dark:#7A5218;
      --off-white:#F5F7F4; --surface:#fff; --border:#DAE3DC;
      --text:#1C2B20; --muted:#556B5C; --good-text:#0A5C30; --good-bg:#E6F4ED;
      --font-head:'Playfair Display',Georgia,serif; --font-body:'Inter',-apple-system,system-ui,sans-serif;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--off-white);color:var(--text);font-family:var(--font-body);line-height:1.6}
    a{color:var(--amber)}
    .topbar{background:var(--forest);padding:18px 24px;display:flex;align-items:center;justify-content:space-between}
    .topbar h1{margin:0;color:var(--amber);font-size:18px;letter-spacing:1px;font-family:var(--font-body);font-weight:700}
    .topbar .sub{color:rgba(255,255,255,.6);font-size:12px;margin-top:2px}
    .topbar button{background:transparent;border:1px solid rgba(255,255,255,.25);color:#fff;padding:7px 14px;border-radius:6px;font-size:13px;cursor:pointer;font-family:inherit}
    .topbar button:hover{background:rgba(255,255,255,.08)}
    .wrap{max-width:960px;margin:0 auto;padding:32px 24px 64px}

    /* ---- Login card ---- */
    .login{max-width:420px;margin:8vh auto;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:40px;box-shadow:0 8px 30px rgba(22,38,28,.06)}
    .login h2{font-family:var(--font-head);font-size:26px;margin:0 0 6px;color:var(--forest)}
    .login p{color:var(--muted);font-size:14px;margin:0 0 24px}
    label{display:block;font-size:13px;font-weight:600;margin:0 0 6px;color:var(--forest)}
    input[type=email]{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:8px;font-size:15px;font-family:inherit}
    input[type=email]:focus{outline:none;border-color:var(--amber)}
    .btn{display:inline-block;width:100%;background:var(--amber);color:#fff;border:none;padding:13px 20px;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:16px}
    .btn:hover{background:var(--amber-dark)}
    .btn:disabled{opacity:.6;cursor:default}
    .note{font-size:13px;margin-top:18px;padding:12px 14px;border-radius:8px;display:none}
    .note.ok{display:block;background:var(--good-bg);color:var(--good-text)}
    .note.err{display:block;background:#FDEDED;color:#8B1A1A}

    /* ---- Dashboard ---- */
    .greeting{font-family:var(--font-head);font-size:30px;color:var(--forest);margin:0 0 4px}
    .greeting-sub{color:var(--muted);margin:0 0 28px}
    .linkbox{background:var(--surface);border:1px solid var(--border);border-left:4px solid var(--amber);border-radius:8px;padding:18px 20px;margin-bottom:28px}
    .linkbox .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:600;margin-bottom:8px}
    .linkrow{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .linkrow code{flex:1;min-width:220px;font-family:ui-monospace,Menlo,monospace;font-size:14px;color:var(--amber-dark);background:var(--off-white);padding:10px 12px;border-radius:6px;word-break:break-all}
    .copybtn{background:var(--forest);color:#fff;border:none;padding:10px 16px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap}
    .copybtn:hover{background:var(--forest-mid)}
    .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:16px;margin-bottom:28px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px}
    .card .num{font-family:var(--font-head);font-size:34px;font-weight:700;color:var(--forest);line-height:1}
    .card .cap{font-size:13px;color:var(--muted);margin-top:6px}
    .card .small{font-size:12px;color:var(--amber-dark);margin-top:4px}
    .section-title{font-family:var(--font-head);font-size:20px;color:var(--forest);margin:0 0 12px}
    table{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden}
    th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);padding:12px 16px;border-bottom:1px solid var(--border);background:var(--off-white)}
    td{padding:12px 16px;border-bottom:1px solid var(--border);font-size:14px}
    tr:last-child td{border-bottom:none}
    .pill{display:inline-block;font-size:11px;font-weight:600;padding:3px 10px;border-radius:999px;text-transform:capitalize}
    .pill.new{background:#EEF3FF;color:#2848A8}
    .pill.contacted{background:#FFF4E0;color:#8A5A12}
    .pill.closed{background:var(--good-bg);color:var(--good-text)}
    .pill.dead{background:#F1F1F1;color:#777}
    .empty{color:var(--muted);font-size:14px;padding:24px;text-align:center;background:var(--surface);border:1px dashed var(--border);border-radius:10px}
    .hidden{display:none}
    .loading{text-align:center;color:var(--muted);padding:60px 0}
    footer{color:var(--muted);font-size:12px;text-align:center;padding:24px}
  </style>
</head>
<body>
  <div class="topbar">
    <div>
      <h1>SOUTHERN GROUND CAPITAL</h1>
      <div class="sub">Affiliate Partner Portal</div>
    </div>
    <button id="logout-btn" class="hidden">Sign out</button>
  </div>

  <!-- LOADING -->
  <div id="view-loading" class="loading">Loading…</div>

  <!-- LOGIN -->
  <div id="view-login" class="login hidden">
    <h2>Affiliate Sign In</h2>
    <p>Enter the email you registered with. We'll send you a secure sign-in link — no password needed.</p>
    <form id="login-form">
      <label for="email">Email address</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
      <button type="submit" class="btn" id="login-btn">Send my sign-in link</button>
    </form>
    <div id="login-note" class="note"></div>
  </div>

  <!-- DASHBOARD -->
  <div id="view-dash" class="wrap hidden">
    <h2 class="greeting" id="greeting">Welcome</h2>
    <p class="greeting-sub" id="greeting-sub"></p>

    <div class="linkbox">
      <div class="lbl">Your Affiliate Link</div>
      <div class="linkrow">
        <code id="aff-link">—</code>
        <button class="copybtn" id="copy-btn">Copy link</button>
      </div>
    </div>

    <div class="cards" id="stat-cards"></div>

    <h3 class="section-title">Your Referrals</h3>
    <div id="leads-area"></div>
  </div>

  <footer>&copy; <span id="yr"></span> Southern Ground Capital, LLC · Questions? <a href="mailto:edgar@sgcapital.io">edgar@sgcapital.io</a></footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="portal.js?v=3"></script>
</body>
</html>
