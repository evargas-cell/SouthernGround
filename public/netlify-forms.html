<!DOCTYPE html>
<html>
  <head><title>Netlify Form Detection</title></head>
  <body>
    <!-- Hero quote form -->
    <form name="quote" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="quote" />
      <input name="bot-field" />
      <input name="loanType" />
      <input name="loanAmount" />
      <input name="propertyType" />
      <input name="name" />
      <input name="phone" />
      <input name="email" />
      <input name="affiliateRef" />
    </form>

    <!-- Contact / loan request form -->
    <form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="contact" />
      <input name="bot-field" />
      <input name="name" />
      <input name="email" />
      <input name="phone" />
      <input name="loanType" />
      <input name="loanAmount" />
      <input name="propertyState" />
      <textarea name="message"></textarea>
      <input name="formType" />
      <input name="affiliateRef" />
    </form>
    <!-- Affiliate sign-up form -->
    <form name="affiliate" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="affiliate" />
      <input name="bot-field" />
      <input name="name" />
      <input name="email" />
      <input name="phone" />
      <input name="formType" />
    </form>
    <!-- Spanish contact form -->
    <form name="contacto-espanol" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="contacto-espanol" />
      <input name="bot-field" />
      <input name="name" />
      <input name="email" />
      <input name="phone" />
      <input name="loanType" />
      <textarea name="message"></textarea>
      <input name="formType" />
    </form>
  </body>
</html>
